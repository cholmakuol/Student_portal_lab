{% extends "base.html" %}
{% block content %}
<section class="card safe-card narrow">
    <h1>Inscription sécurisée</h1>
    <p>Les mots de passe sont hachés. Les entrées sont validées avant l'enregistrement.</p>
    <form method="post">
        <label>Nom d'utilisateur</label><input name="username" required>
        <label>Mot de passe</label><input name="password" type="password" required>
        <label>Nom complet</label><input name="full_name" required>
        <label>Email</label><input name="email" type="email" required>
        <label>Bio</label><textarea name="bio"></textarea>
        <button class="btn" type="submit">S'inscrire</button>
    </form>
</section>
{% endblock %}
