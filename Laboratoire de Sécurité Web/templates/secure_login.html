{% extends "base.html" %}
{% block content %}
<section class="card safe-card narrow">
    <h1>Connexion sécurisée</h1>
    <p>Cette connexion utilise des requêtes paramétrées et des mots de passe hachés.</p>
    <form method="post">
        <label>Nom d'utilisateur</label>
        <input name="username" placeholder="chol" required>
        <label>Mot de passe</label>
        <input name="password" type="password" placeholder="chol@12345" required>
        <button class="btn" type="submit">Se connecter</button>
    </form>
    <p><a href="{{ url_for('secure_register') }}">Créer un utilisateur de test sécurisé</a></p>
</section>
{% endblock %}
