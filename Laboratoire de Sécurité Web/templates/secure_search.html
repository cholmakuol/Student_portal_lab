{% extends "base.html" %}
{% block content %}
<section class="card safe-card">
    <h1>Recherche sécurisée des modules</h1>
    <p>Les requêtes SQL sont paramétrées et les résultats sont limités à l'utilisateur connecté.</p>
    <form method="get">
        <label>Recherche</label>
        <input name="q" value="{{ q }}" placeholder="Web">
        <button class="btn" type="submit">Rechercher</button>
    </form>
    <table>
        <thead><tr><th>ID</th><th>Code</th><th>Titre</th><th>Note</th></tr></thead>
        <tbody>{% for r in results %}<tr><td>{{ r['id'] }}</td><td>{{ r['code'] }}</td><td>{{ r['title'] }}</td><td>{{ r['grade'] }}</td></tr>{% endfor %}</tbody>
    </table>
</section>
{% endblock %}
